name: HRMS CI Pipeline

on:
  push:
    branches:
      - main

env:
  ECR_REPOSITORY: 089855661736.dkr.ecr.us-east-1.amazonaws.com/hrms-app
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Build Docker Image
        run: docker build -t hrms-app .

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag Docker Image
        run: |
          docker tag hrms-app:latest $ECR_REPOSITORY:latest
          docker tag hrms-app:latest $ECR_REPOSITORY:$IMAGE_TAG

      - name: Push Docker Image
        run: |
          docker push $ECR_REPOSITORY:latest
          docker push $ECR_REPOSITORY:$IMAGE_TAG

      - name: Update Kubernetes Manifest Image
        run: |
          sed -i "s|image:.*|image: $ECR_REPOSITORY:$IMAGE_TAG|g" k8s/app-deployment.yaml

      - name: Commit and Push Manifest Update
        run: |
          git config --global user.email "vinuthnakoganti12@gmail.com"
          git config --global user.name "vinuthnak12"
          git add k8s/app-deployment.yaml
          git commit -m "Update image to $IMAGE_TAG"
          git push
